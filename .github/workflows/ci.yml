name: CI
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # ---------------------------------------
  # MINIMUM DEPENDENCIES
  # ---------------------------------------
  min-deps:
    name: Minimum dependencies (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install minimum direct dependencies
        run: uv pip install --resolution lowest-direct --upgrade . --group test
      - name: Run tests against minimum dependencies
        run: uv run --no-sync --group test pytest -ra --maxfail=1 --durations=10
  # ---------------------------------------
  # FULL TEST MATRIX
  # ---------------------------------------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - name: Sync test dependencies
        run: uv sync --group test
      - name: Run tests
        run: uv run --group test pytest -ra
  # ---------------------------------------
  # PACKAGE BUILD
  # ---------------------------------------
  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: |
          uv pip install --system build twine
          python -m build
          twine check dist/*
  # ---------------------------------------
  # DOCS BUILD
  # ---------------------------------------
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Sync docs dependencies
        run: uv sync --group docs
      - name: Build docs
        run: make -C docs html

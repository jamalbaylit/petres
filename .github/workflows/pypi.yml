name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    outputs:
      is_main: ${{ steps.branch_check.outputs.is_main }}
      is_develop: ${{ steps.branch_check.outputs.is_develop }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect branch from tag
        id: branch_check
        run: |
          git fetch origin main develop

          BRANCHES=$(git branch -r --contains $GITHUB_SHA)

          echo "Branches containing commit:"
          echo "$BRANCHES"

          if echo "$BRANCHES" | grep -q "origin/main"; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

          if echo "$BRANCHES" | grep -q "origin/develop"; then
            echo "is_develop=true" >> $GITHUB_OUTPUT
          else
            echo "is_develop=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: |
          uv pip install --system build twine
          python -m build
          twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: testpypi
    if: >
      (github.event_name == 'push' && needs.build.outputs.is_develop == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
    if: >
      (github.event_name == 'push' && needs.build.outputs.is_main == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
name: Publish package

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: |
          uv pip install --system build twine
          python -m build
          twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: testpypi
    if: >
      (github.event_name == 'push' && github.ref_name == 'develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
    if: >
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      # Optional but recommended: prevent duplicate version upload
      - name: Check if version exists on PyPI
        run: |
          pip install requests
          VERSION=$(python -c "import petres; print(petres.__version__)")
          python - <<EOF
import requests
url = f"https://pypi.org/pypi/petres/{VERSION}/json"
if requests.get(url).status_code == 200:
    raise SystemExit(f"Version {VERSION} already exists on PyPI")
EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
name: Publish package

on:
  push:
    tags:
      - "v*"
    branches:
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install build tools
        run: uv pip install --system build twine setuptools-scm

      - name: Build distributions
        run: |
          python -m build
          twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: testpypi

    # Only dev branch builds go to TestPyPI
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi

    # Publish ONLY on version tags (v1.2.3, v1.2.3rc1, etc.)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
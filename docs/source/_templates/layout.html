{% extends "!layout.html" %}

{% block extrahead %}
    {{ super() }}

    <link rel="icon"
          href="{{ pathto(favicon_light, 1) }}"
          type="image/svg+xml"
          media="(prefers-color-scheme: light)">

    <link rel="icon"
          href="{{ pathto(favicon_dark, 1) }}"
          type="image/svg+xml"
          media="(prefers-color-scheme: dark)">
{% endblock %}
